# Wolf Alabaster Dark Mono for Kitty
# Based on https://github.com/wolf/alabaster-for-helix
# Author: Wolf <wolf@zv.cx>
#
# Dark monochromatic theme - mostly grayscale with subtle backgrounds
# Only errors (yellow) and search results (orange) use color
# Uses orange (#FF9800) as the "green/success" accent in terminal

# Core colors from wolf-alabaster-dark-mono
foreground              #CECECE
background              #0E1415
selection_foreground    #0E1415
selection_background    #CD974B

# Cursor colors - golden brown active, dimmed gold secondary
cursor                  #CD974B
cursor_text_color       #0E1415

# URL underline color - subtle grey
url_color               #8C8C8C

# Kitty window border colors
active_border_color     #CD974B
inactive_border_color   #252526
bell_border_color       #FF9800

# OS Window titlebar colors
wayland_titlebar_color  #0E1415
macos_titlebar_color    #0E1415

# Tab bar colors
active_tab_foreground   #0E1415
active_tab_background   #CD974B
inactive_tab_foreground #8C8C8C
inactive_tab_background #252526
tab_bar_background      #0E1415

# Colors for marks (marked text in the terminal)
mark1_foreground #0E1415
mark1_background #CD974B
mark2_foreground #0E1415
mark2_background #4A7BA7
mark3_foreground #0E1415
mark3_background #FF9800

# The 16 terminal colors
# Note: Using orange (#FF9800) as "green" per user request

# black (dark backgrounds)
color0   #0E1415
color8   #0E1415

# red (error-yellow in Alabaster)
color1   #FF9800
color9   #FF9800

# green (ORANGE as requested - Alabaster highlight color)
color2   #FF9800
color10  #FF9800

# yellow (golden brown - Alabaster active)
color3   #FF9800
color11  #FF9800

# blue (definition blue)
color4   #005B65
color12  #005B65

# magenta (constant magenta)
color5   #005B65
color13  #005B65

# cyan (dimmed blue)
color6   #005B65
color14  #005B65

# white (greyscale text colors)
color7   #CECECE
color15  #CECECE
